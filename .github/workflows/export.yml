name: Compile Godot Android Templates From Source (True 2D/3D Split)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  compile-android-templates:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: "2d-only", scons_flags: "disable_3d=yes" }
          - { name: "3d-only", scons_flags: "disable_2d=yes" }

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java (For Android Export)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '26.3.11579264'

      # تثبيت أدوات البناء الضرورية لعمل كومبايل لمحرك Godot (Python و SCons)
      - name: Setup Build Dependencies (Python & SCons)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install SCons
        run: python -m pip install scons

      # جلب رقم أحدث إصدار مستقر وعمل Clone للسورس كود الخاص بـ Godot بالكامل
      - name: Clone Godot Engine Source Code
        id: get-version
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/godotengine/godot.git | grep -E 'refs/tags/4\.[0-9]+\.[0-9]+-stable' | tail -n 1 | cut -d '/' -f 3 | sed 's/-stable//')
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="4.3.0"
          fi
          echo "Cloning Godot version: $LATEST_TAG"
          git clone --depth 1 --branch "${LATEST_TAG}-stable" https://github.com/godotengine/godot.git /tmp/godot-source
          echo "VERSION=$LATEST_TAG" >> $GITHUB_OUTPUT

      # بناء المحرك من المصدر للأندرويد مع تطبيق خيارات الفصل (تأخذ وقتاً على السيرفر)
      - name: Compile Custom Android Templates (All Architectures)
        run: |
          cd /tmp/godot-source
          
          echo "Compiling Release Template for Android..."
          # بناء نسخة الـ Release لكل المعماريات القياسية مع دمج ميزات الفصل ومكتبة Swappy
          scons platform=android target=template_release arch=arm64 ${{ matrix.variant.scons_flags }}
          scons platform=android target=template_release arch=arm32 ${{ matrix.variant.scons_flags }}
          scons platform=android target=template_release arch=x86_64 ${{ matrix.variant.scons_flags }}

      # تجميع الملفات المصدرية الناتجة داخل مجلد المشروع
      - name: Package Custom Android Source Templates
        run: |
          OUTPUT_DIR="builds/${{ matrix.variant.name }}/android"
          mkdir -p "$OUTPUT_DIR"
          
          cd /tmp/godot-source/platform/android/java
          # توليد ملفات الـ AAR وقوالب أندرويد المخصصة بناءً على الكومبايل الجديد
          ./gradlew generateGodotTemplates
          
          # نسخ الـ source_android.zip المخصص والمفصول من المصدر تماماً
          cp bin/android_source.zip "$GITHUB_WORKSPACE/$OUTPUT_DIR/source_android.zip"
          
          # ضغط كود مشروع لعبتك الحالي أيضاً ليكون بجانبه
          cd $GITHUB_WORKSPACE
          zip -r "$OUTPUT_DIR/project_source.zip" . -x "builds/*" ".git/*" ".github/*" ".godot/*"

      # رفع الناتج الحقيقي المنفصل برمجياً من النواة
      - name: Upload True Split Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: true-split-godot-${{ matrix.variant.name }}
          path: builds/${{ matrix.variant.name }}/android/
          retention-days: 30
