name: Export Godot Game - Android Only (2D & 3D)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  export-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: "2d-only" }
          - { name: "3d-only" }

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      # إعداد جافا 17 للأندرويد ومكتبة Swappy
      - name: Setup Java (For Android Export)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # تثبيت الـ Android SDK والـ NDK لبناء مكتبة Swappy لجميع المعماريات
      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '26.3.11579264'

      # جلب رقم أحدث إصدار مستقر تلقائياً من مستودع Godot الرسمي
      - name: Get Latest Godot Version
        id: get-version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/godotengine/godot/releases | jq -r '[.[] | select(.prerelease == false and (.tag_name | contains("stable")))] | first .tag_name' | sed 's/-stable//')
          # في حال فشل الـ API لأي سبب، نضع إصدار 4.3.0 كإصدار احتياطي (Fallback) لضمان عدم توقف السيرفر
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            LATEST_VERSION="4.7.1"
          fi
          echo "GODOT_VERSION=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest stable Godot version found: $LATEST_VERSION"

      # إعداد Godot باستخدام رقم الإصدار المجلوب تلقائياً
      - name: Setup Latest Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ steps.get-version.outputs.GODOT_VERSION }}
          use-mono: false
          include-templates: true

      # تصدير اللعبة واستخراج ملف المصدر البرمجي للأندرويد
      - name: Export Android Build & Source ZIP
        run: |
          RELEASES_DIR="builds/${{ matrix.variant.name }}/android"
          mkdir -p "$RELEASES_DIR"
          
          echo "Exporting Android APK (${{ matrix.variant.name }})..."
          godot --headless --export-release "Android" "$RELEASES_DIR/game.apk"
          
          echo "Generating source_android.zip..."
          GODOT_TEMPLATES_PATH="$HOME/.local/share/godot/export_templates"
          VERSION_DIR=$(ls -d $GODOT_TEMPLATES_PATH/* | head -n 1)
          
          if [ -f "$VERSION_DIR/android_source.zip" ]; then
            cp "$VERSION_DIR/android_source.zip" "$RELEASES_DIR/source_android.zip"
          else
            # حيلة بديلة في حال اختلف مسار القوالب لإنشاء ملف المصدر عبر ميزة التصدير الخاصة بـ Godot
            godot --headless --export-pack "Android" "$RELEASES_DIR/source_android.zip" || true
          fi

      # رفع ملف الـ APK وملف الـ source_android.zip كـ Artifacts مستقلة لكل نسخة
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-android-${{ matrix.variant.name }}
          path: builds/${{ matrix.variant.name }}/android/
          retention-days: 30
