name: Compile Godot Android Templates From Source (True 2D/3D Split)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  compile-android-templates:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: "2d-only", scons_flags: "disable_3d=yes" }
          - { name: "3d-only", scons_flags: "disable_2d=yes" }

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '26.3.11579264'

      - name: Setup Build Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install SCons
        run: python -m pip install scons

      - name: Clone Godot Engine Source Code
        id: get-version
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/godotengine/godot.git | grep -E 'refs/tags/4\.[0-9]+\.[0-9]+-stable' | tail -n 1 | cut -d '/' -f 3 | sed 's/-stable//')
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="4.3.0"
          fi
          echo "Cloning Godot version: $LATEST_TAG"
          git clone --depth 1 --branch "${LATEST_TAG}-stable" https://github.com/godotengine/godot.git /tmp/godot-source
          echo "VERSION=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Compile Custom Android Templates
        run: |
          cd /tmp/godot-source
          CORES=\( (( \)(nproc) - 1))
          echo "Compiling with -j\( CORES cores ( \){{ matrix.variant.name }})..."
          
          scons platform=android target=template_release arch=arm64 ${{ matrix.variant.scons_flags }} -j$CORES
          scons platform=android target=template_release arch=arm32 ${{ matrix.variant.scons_flags }} -j$CORES
          scons platform=android target=template_release arch=x86_64 ${{ matrix.variant.scons_flags }} -j$CORES

      - name: Generate Godot Templates (APK + Source ZIP)
        run: |
          cd /tmp/godot-source/platform/android/java
          ./gradlew generateGodotTemplates --quiet

      - name: Package Artifacts
        run: |
          OUTPUT_DIR="builds/${{ matrix.variant.name }}/android"
          mkdir -p "$OUTPUT_DIR"
          
          cd /tmp/godot-source
          
          # android_source.zip
          if [ -f "bin/android_source.zip" ]; then
            cp bin/android_source.zip "$GITHUB_WORKSPACE/$OUTPUT_DIR/source_android.zip"
            echo "✅ Found android_source.zip"
          else
            echo "⚠️ Searching for android_source.zip..."
            find . -name "android_source.zip" -exec cp {} "$GITHUB_WORKSPACE/$OUTPUT_DIR/source_android.zip" \; || echo "❌ Not found"
          fi
          
          # APK Release
          if [ -f "bin/android_release.apk" ]; then
            cp bin/android_release.apk "$GITHUB_WORKSPACE/\( OUTPUT_DIR/godot_template_ \){{ matrix.variant.name }}_release.apk"
            echo "✅ Found android_release.apk"
          else
            echo "⚠️ Searching for APK..."
            APK=$(find . -name "android_release.apk" | head -n 1)
            if [ -n "$APK" ]; then
              cp "$APK" "$GITHUB_WORKSPACE/\( OUTPUT_DIR/godot_template_ \){{ matrix.variant.name }}_release.apk"
              echo "✅ Found APK at $APK"
            else
              echo "❌ No APK found!"
            fi
          fi
          
          # مشروعك
          cd $GITHUB_WORKSPACE
          zip -r "$OUTPUT_DIR/project_source.zip" . -x "builds/*" ".git/*" ".github/*" ".godot/*" "*.zip" "*.apk"

      - name: Upload True Split Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: true-split-godot-${{ matrix.variant.name }}
          path: builds/${{ matrix.variant.name }}/android/
          retention-days: 30
