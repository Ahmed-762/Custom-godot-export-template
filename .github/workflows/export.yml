name: Export Godot Game - Android Only (2D & 3D)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  export-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: "2d-only" }
          - { name: "3d-only" }

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      # إعداد جافا للأندرويد ومكتبة Swappy
      - name: Setup Java (For Android Export)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # تثبيت الـ Android SDK والـ NDK لبناء مكتبة Swappy لجميع المعماريات
      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '26.3.11579264'

      # جلب رقم أحدث إصدار مستقر تلقائياً باستخدام Git
      - name: Get Latest Godot Tag via Git
        id: get-version
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/godotengine/godot.git | grep -E 'refs/tags/[0-9]+\.[0-9]+(\.[0-9]+)?-stable' | tail -n 1 | cut -d '/' -f 3 | sed 's/-stable//')
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="4.3.0"
          fi
          echo "GODOT_VERSION=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest stable Godot version found via Git: $LATEST_TAG"

      # إعداد نسخة Godot القياسية (العادية وليست Mono)
      - name: Setup Latest Godot Engine (Standard/Non-Mono)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ steps.get-version.outputs.GODOT_VERSION }}
          use-mono: false # <--- إغلاق الـ Mono تماماً ليعمل كـ محرك عادي
          include-templates: true

      # تصدير اللعبة وتجهيز الملفات المصدرية
      - name: Export Android Build & Package Source
        run: |
          RELEASES_DIR="builds/${{ matrix.variant.name }}/android"
          mkdir -p "$RELEASES_DIR"
          
          echo "Exporting Android APK (${{ matrix.variant.name }})..."
          godot --headless --export-release "Android" "$RELEASES_DIR/game.apk"
          
          echo "Generating source_android.zip (Android Build Templates)..."
          GODOT_TEMPLATES_PATH="$HOME/.local/share/godot/export_templates"
          VERSION_DIR=$(ls -d $GODOT_TEMPLATES_PATH/* | head -n 1)
          
          if [ -f "$VERSION_DIR/android_source.zip" ]; then
            cp "$VERSION_DIR/android_source.zip" "$RELEASES_DIR/source_android.zip"
          else
            godot --headless --export-pack "Android" "$RELEASES_DIR/source_android.zip" || true
          fi
          
          echo "Archiving Project Source Code..."
          # ضغط الكود المصدري لمشروع اللعبة الحالي بالكامل مع استبعاد المجلدات المؤقتة وبناء الـ CI
          zip -r "$RELEASES_DIR/project_source.zip" . -x "builds/*" ".git/*" ".github/*" ".godot/*"

      # رفع كافة المخرجات (الـ APK، قالب أندرويد المخصص، وكود المشروع المصدري)
      - name: Upload Android & Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-android-${{ matrix.variant.name }}
          path: builds/${{ matrix.variant.name }}/android/
          retention-days: 30
